resolver 1.1.1.1 8.8.8.8 valid=30s ipv6=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;

    # Reverse-proxy the backend so the SPA can call /api/* same-origin
    # The backend hostname is set at build time via BACKEND_HOST and
    # resolved at runtime by the Docker DNS.
    location /api/ {
        set $backend_host "${BACKEND_HOST}";
        proxy_pass http://$backend_host;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health-backend {
        set $backend_host "${BACKEND_HOST}";
        proxy_pass http://$backend_host/health;
        proxy_set_header Host $backend_host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
